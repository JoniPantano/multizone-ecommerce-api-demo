services:
  - type: web
    name: multizona-api
    env: node
    plan: free
    rootDir: .
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm prisma generate
    startCommand: corepack pnpm start:render
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: multizona-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: PUBLIC_API_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: EXPOSE_VERIFICATION_CODE
        value: "true"

databases:
  - name: multizona-db
    databaseName: multizona_db
    user: multizona_user
    plan: free
